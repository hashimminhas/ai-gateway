version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://aigateway:aigateway@db:5432/aigateway
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
    depends_on:
      - db
    networks:
      - aigateway-net

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aigateway
      - POSTGRES_PASSWORD=aigateway
      - POSTGRES_DB=aigateway
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aigateway-net

volumes:
  pgdata:

networks:
  aigateway-net:
    driver: bridge
